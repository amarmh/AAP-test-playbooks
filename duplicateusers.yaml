---
# Usage: ansible-playbook find_duplicate_users.yml -e "output_format=csv"
# Supported formats: csv, json

- name: Find gateway users with duplicate emails and list permissions
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: true
    output_format: "json"  # Defaulting to json if not provided via -e

  tasks:
    - name: Load users and authenticators through the API
      ansible.builtin.set_fact:
        users: >-
          {{
            query('ansible.platform.gateway_api', 'users',
                  return_all=True, return_objects=True,
                  host=aap_hostname, username=aap_username,
                  password=aap_password, verify_ssl=aap_validate_certs)
          }}
        authenticators: >-
          {{
            query('ansible.platform.gateway_api', 'authenticators',
                  return_all=True, return_objects=True,
                  host=aap_hostname, username=aap_username,
                  password=aap_password, verify_ssl=aap_validate_certs)
          }}

    - name: Map authenticators by ID for easy lookup
      ansible.builtin.set_fact:
        authenticators_by_id: "{{ (authenticators_by_id | default({})) | combine({item.id: item.name}) }}"
      loop: "{{ authenticators }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Group users by email address
      ansible.builtin.set_fact:
        users_by_email: >-
          {{
            (users_by_email | default({})) | combine({
              item.email: (users_by_email[item.email] | default([])) + [item]
            })
          }}
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.username }}"
      when: item.email is defined and item.email | length > 0

    - name: Identify users with shared emails
      ansible.builtin.set_fact:
        dupe_user_list: >-
          {{
            dupe_user_list | default([]) + [{
              'email': email_item.0.key,
              'username': email_item.1.username,
              'user_id': email_item.1.id,
              'associated_authenticators': (email_item.1.associated_authenticators | default({}))
            }]
          }}
      loop: "{{ users_by_email | dict2items | subelements('value') }}"
      loop_control:
        loop_var: email_item
        label: "{{ email_item.0.key }} - {{ email_item.1.username }}"
      when: (users_by_email[email_item.0.key] | length) > 1

    - name: Fetch role assignments for each duplicate user
      ansible.builtin.set_fact:
        user_roles: >-
          {{
            user_roles | default({}) | combine({
              item.username: query(
                'ansible.platform.gateway_api',
                'role_user_assignments',
                query_params={'user_id': item.user_id},
                return_all=True,
                return_objects=True,
                host=aap_hostname,
                username=aap_username,
                password=aap_password,
                verify_ssl=aap_validate_certs
              )
            })
          }}
      loop: "{{ dupe_user_list | default([]) }}"
      loop_control:
        label: "{{ item.username }}"

    - name: Extract role names (handling ID vs Object)
      ansible.builtin.set_fact:
        user_role_summary: >-
          {{
            user_role_summary | default({}) | combine({
              item.key: (
                item.value 
                | map(attribute='role_definition') 
                | map('extract_name_or_id') 
                | list
              )
            })
          }}
      vars:
        # If role_definition is a dict, get .name; if it's an int, return string ID
        extract_name_or_id: "{{ i.name if i is mapping else i | string }}"
      loop: "{{ user_roles | default({}) | dict2items }}"
      loop_control:
        loop_var: item
        label: "{{ item.key }}"

    - name: Prepare report rows
      ansible.builtin.set_fact:
        table_rows: >-
          {{
            table_rows | default([]) + [{
              'email': item.email,
              'username': item.username,
              'authenticators': (item.associated_authenticators.keys() | map('extract_auth_name') | list | join('; ')),
              'roles': (user_role_summary[item.username] | default([]) | join('; '))
            }]
          }}
      vars:
        extract_auth_name: "{{ authenticators_by_id[item | int] | default('ID:' + item | string) }}"
      loop: "{{ dupe_user_list | default([]) }}"
      loop_control:
        label: "{{ item.username }}"

    - name: Generate CSV lines
      ansible.builtin.set_fact:
        csv_lines: >-
          {{
            csv_lines | default(['email,username,authenticators,roles']) +
            [item.email + ',' + item.username + ',' + item.authenticators + ',' + item.roles]
          }}
      loop: "{{ table_rows | default([]) }}"
      when: output_format == 'csv'

    - name: Display CSV Report
      ansible.builtin.debug:
        msg: "{{ csv_lines }}"
      when: output_format == 'csv' and csv_lines is defined

    - name: Display JSON Report
      ansible.builtin.debug:
        var: table_rows
      when: output_format == 'json' and table_rows is defined

    - name: No duplicates notification
      ansible.builtin.debug:
        msg: "No duplicate email addresses found."
      when: table_rows is not defined or table_rows | length == 0
